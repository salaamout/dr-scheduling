{% extends "base.html" %}
{% block title %}Edit {{ patient.full_name }} — Medical Mission Logs{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/patient/{{ patient.id }}" class="text-blue-600 hover:underline text-sm">← Back to Patient</a>
</div>

<div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 max-w-lg">
    <h1 class="text-xl font-bold text-gray-800 mb-4">Edit Patient</h1>

    <form action="/patient/{{ patient.id }}/edit" method="POST">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
            <input type="text" name="full_name" value="{{ patient.full_name }}" required
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:outline-none">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Chart ID *</label>
            <input type="text" name="chart_id" value="{{ patient.chart_id }}" required
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:outline-none">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth *</label>
            <input type="date" name="date_of_birth" value="{{ patient.date_of_birth }}" required
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:outline-none">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
            <textarea name="notes" rows="3"
                      class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:outline-none">{{ patient.notes }}</textarea>
        </div>
        <div class="flex gap-3 justify-end">
            <a href="/patient/{{ patient.id }}" class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-50 text-sm">
                Cancel
            </a>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm font-medium">
                Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
